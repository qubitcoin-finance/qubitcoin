name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  MINER_IMAGE: qubitcoin-finance/qbtcd

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Git Version
        id: version
        uses: codacy/git-version@2.7.1
        with:
          release-branch: main
          minor-identifier: "feat:"
          major-identifier: "breaking:"
          prefix: "v"

      - name: Extract metadata (miner)
        id: meta-miner
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.MINER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Extract metadata (website)
        id: meta-website
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.WEBSITE_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Build and push miner
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-miner.outputs.tags }}
          labels: ${{ steps.meta-miner.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Build website
        run: cd website && pnpm install --frozen-lockfile && pnpm build

      - name: Upload website artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-dist
          path: website/dist/
          retention-days: 1

  deploy:
    needs: build-and-push
    runs-on: [self-hosted, linux]
    permissions:
      packages: read
    concurrency:
      group: deploy-qubitcoin
      cancel-in-progress: false
    env:
      MINER_IMAGE: ghcr.io/qubitcoin-finance/qbtcd:main
      MINER_CONTAINER: qbtc-miner
      DATA_DIR: /home/qubitcoin/qbtc-data
      RPC_PORT: 3001
      P2P_PORT: 6001

    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      # ----- Backend (Docker container) -----
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Pull latest miner image
        run: docker pull $MINER_IMAGE

      # ----- Miner deployment -----
      - name: Stop existing miner container
        run: docker stop $MINER_CONTAINER && docker rm $MINER_CONTAINER || true

      - name: Wait for ports to be released
        run: sleep 5

      - name: Start new miner container
        run: |
          docker run -d \
            --name $MINER_CONTAINER \
            --restart unless-stopped \
            -p $RPC_PORT:3001 \
            -p $P2P_PORT:6001 \
            -v $DATA_DIR:/data \
            $MINER_IMAGE \
            --mine --datadir /data

      - name: Wait for miner to be healthy
        run: |
          echo "Waiting for miner to start..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:$RPC_PORT/api/v1/status; then
              echo ""
              echo "Miner is up after $((i * 10))s"
              exit 0
            fi
            sleep 10
          done
          echo "Miner failed to start within 300s"
          docker logs --tail 50 $MINER_CONTAINER
          exit 1

      # ----- Website deployment (static files via nginx) -----
      - name: Download website artifact
        uses: actions/download-artifact@v4
        with:
          name: website-dist
          path: website-dist

      - name: Deploy website files
        run: |
          WEBSITE_ROOT=/home/qubitcoin/www
          mkdir -p $WEBSITE_ROOT
          rm -rf $WEBSITE_ROOT/*
          cp -r website-dist/* $WEBSITE_ROOT/

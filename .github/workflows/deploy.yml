name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  MINER_IMAGE: qubitcoin-finance/qbtcd

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Git Version
        id: version
        uses: codacy/git-version@2.7.1
        with:
          release-branch: main
          minor-identifier: "feat:"
          major-identifier: "breaking:"
          prefix: "v"

      - name: Extract metadata (miner)
        id: meta-miner
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.MINER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Extract metadata (website)
        id: meta-website
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.WEBSITE_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Build and push miner
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-miner.outputs.tags }}
          labels: ${{ steps.meta-miner.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Build website
        run: cd website && pnpm install --frozen-lockfile && pnpm build

      - name: Upload website artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-dist
          path: website/dist/
          retention-days: 1

  deploy:
    needs: build-and-push
    runs-on: [self-hosted, linux]
    permissions:
      packages: read
    concurrency:
      group: deploy-qubitcoin
      cancel-in-progress: false
    env:
      RPC_PORT: 3010

    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      # ----- Backend: docker compose manages qbtc-node, qbtc-q, qbtc-devtx -----
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Pull latest images
        run: docker compose pull

      # One-shot migration: remove legacy containers created outside of compose
      # so `docker compose up` can claim the names. No-op once compose owns them.
      - name: Adopt legacy containers
        run: |
          for c in qbtc-node qbtc-q qbtc-devtx; do
            if docker inspect "$c" >/dev/null 2>&1; then
              project=$(docker inspect "$c" --format '{{index .Config.Labels "com.docker.compose.project"}}')
              if [ -z "$project" ]; then
                echo "Removing legacy non-compose container: $c"
                docker rm -f "$c"
              fi
            fi
          done

      - name: Apply compose stack
        run: docker compose up -d --remove-orphans

      - name: Wait for qbtc-node to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:$RPC_PORT/api/v1/status; then
              echo ""
              echo "qbtc-node up after $((i * 10))s"
              exit 0
            fi
            sleep 10
          done
          echo "qbtc-node failed to start within 300s"
          docker compose logs --tail 50
          exit 1

      # ----- Website deployment (static files via nginx) -----
      - name: Download website artifact
        uses: actions/download-artifact@v4
        with:
          name: website-dist
          path: website-dist

      - name: Deploy website files
        run: |
          WEBSITE_ROOT=/home/qubitcoin/www
          mkdir -p $WEBSITE_ROOT
          rm -rf $WEBSITE_ROOT/*
          cp -r website-dist/* $WEBSITE_ROOT/

# Production deployment for qubitcoin.finance.
# Used by .github/workflows/deploy.yml on the self-hosted runner.

services:
  qbtc-miner:
    image: ghcr.io/qubitcoin-finance/qbtcd:main
    container_name: qbtc-miner
    restart: unless-stopped
    network_mode: host
    environment:
      NODE_OPTIONS: --max-old-space-size=12288
    volumes:
      - /home/qubitcoin/qbtc-data:/data
      - /home/qubitcoin/qbtc-snapshot.jsonl:/snapshot.jsonl
    command:
      - --mine
      - --datadir=/data
      - --port=3010
      - --snapshot=/snapshot.jsonl
      - --rpc-bind=127.0.0.1
